<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 주식 섹터 및 테마 시황 (Premium Light)</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Soft background gradients for light theme -->
    <div class="bg-decoration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-line"></div>
            <h1>미국 시장 현황</h1>
            <p>지수, 섹터 및 하위 테마 실시간 등락률 대시보드</p>
        </header>

        <section class="indices-section">
            <div class="section-header">
                <h2>주요 시장 지수 <span id="indices-date" class="date-badge"></span></h2>
            </div>
            <div id="indices-container" class="grid-container indices-grid">
                <div class="loader">
                    <div class="spinner"></div>
                    <span>데이터 불러오는 중...</span>
                </div>
            </div>
        </section>

        <section class="sectors-section">
            <div class="section-header space-between">
                <h2>섹터 및 테마별 시황 <span id="sectors-date" class="date-badge"></span></h2>
                <div class="controls-group">
                    <button id="filter-btn" class="premium-btn">보기 설정 <span class="btn-icon">👁️</span></button>
                    <button id="sort-btn" class="premium-btn primary">정렬 기준 <span class="btn-icon">▲</span></button>
                </div>
            </div>
            <div id="sectors-container" class="board-container">
                <!-- 5 Columns -->
                <div class="board-column" id="board-col-1"></div>
                <div class="board-column" id="board-col-2"></div>
                <div class="board-column" id="board-col-3"></div>
                <div class="board-column" id="board-col-4"></div>
                <div class="board-column" id="board-col-5"></div>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
