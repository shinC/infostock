<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 주식 섹터 및 테마 시황 (Glassmorphism Dark)</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Distinctive fonts for premium feel: Outfit for headers, Fira Code for data -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Atmospheric background mesh -->
    <div class="bg-mesh">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <!-- Noise overlay for premium texture -->
    <div class="noise-overlay"></div>

    <div class="container">
        <header>
            <div class="header-glow"></div>
            <h1>US MARKET PULSE</h1>
            <p>지수, 섹터 및 하위 테마 등락률 대시보드</p>
        </header>

        <section class="indices-section">
            <div class="section-header">
                <h2>MARKET INDICES <span id="indices-date" class="date-badge"></span></h2>
            </div>
            <div id="indices-container" class="grid-container indices-grid">
                <div class="loader">
                    <div class="spinner"></div>
                    <span>INITIALIZING...</span>
                </div>
            </div>
        </section>

        <section class="sectors-section">
            <div class="section-header space-between">
                <h2>SECTORS & THEMES <span id="sectors-date" class="date-badge"></span></h2>
                <div class="controls-group">
                    <button id="filter-btn" class="glass-btn">보기: 전체 뷰 <span class="btn-icon">👁️</span></button>
                    <button id="sort-btn" class="glass-btn primary">정렬: 높은 순 <span class="btn-icon">▲</span></button>
                </div>
            </div>
            <div id="sectors-container" class="board-container">
                <!-- 5 Columns will be generated inside -->
                <div class="board-column" id="board-col-1"></div>
                <div class="board-column" id="board-col-2"></div>
                <div class="board-column" id="board-col-3"></div>
                <div class="board-column" id="board-col-4"></div>
                <div class="board-column" id="board-col-5"></div>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
